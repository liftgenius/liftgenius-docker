services:
  ts-rabbitmq:
    image: tailscale/tailscale:latest
    container_name: ts-rabbitmq
    hostname: rabbitmq
    networks:
      local_network:
        ipv4_address: 10.5.0.10
    ports:
    - '80:80' # this is needed for OpenTofu provider w/o using NginxProxyManager
    - '40128:40128' #this is needed for OpenTofu provider
    - '5672:5672'
    - '5673:5673'
    - '15672:15672'
    env_file:
    - ../../.env
    volumes:
    - ./tailscale/state:/var/lib/tailscale
    devices:
    - /dev/net/tun:/dev/net/tun
    cap_add:
    - net_admin
    - sys_module
    restart: unless-stopped
    
  rabbitmq:
    image: 'rabbitmq:4.2.4-management-alpine'
    network_mode: service:ts-rabbitmq
    volumes:
    - ./rabbitmq/data:/var/lib/rabbitmq
    - ./rabbitmq/log:/var/log/rabbitmq

volumes:
  ts-alpine:
    driver: local