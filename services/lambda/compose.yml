services:
  ts-lambda:
    image: tailscale/tailscale
    container_name: ts-lambda
    hostname: lambda
    networks:
      local_network:
        ipv4_address: 10.5.0.13
    ports:
    - "3000:3000"
    env_file:
    - ../../.env
    volumes:
    - ./tailscale/state:/var/lib/tailscale
    devices:
    - /dev/net/tun:/dev/net/tun
    cap_add:
    - net_admin
    - sys_module

  lambda:
    image: dockerized-sam:latest
    build: .
    command: ["$PWD"]
    volumes:
    - .:/app
    - /var/run/docker.sock:/var/run/docker.sock
    network_mode: service:ts-lambda

volumes:
  ts-alpine:
    driver: local